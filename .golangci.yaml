version: "2"
run:
  modules-download-mode: readonly
  timeout: 10m
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
  exclusions:
    rules:
    # Allow underscores in names in test files because the
    # HashiCorp-recommended/documented convention uses
    # underscores in function names
    - path: _test\.go
      linters:
        - revive
      text: "^var-naming"
    - path: _test\.go
      linters:
        - stylecheck
      text: "^ST1003"
    # Allow underscores in package names for existing packages whose directory
    # names use underscores (connection_route_filter, route_filter, route_filter_rule)
    - path: "(connection_route_filter|route_filter|route_filter_rule)/"
      linters:
        - revive
      text: "don't use an underscore in package name"
    # Ignore linter errors in Metal files (deprecated code to be removed in v5.0.0)
    - path: equinix/data_source_metal_.*\.go
      linters:
        - errcheck
        - revive
        - staticcheck
        - unused
    - path: equinix/resource_metal_.*\.go
      linters:
        - errcheck
        - revive
        - staticcheck
        - unused
    - path: internal/resources/metal/.*\.go
      linters:
        - errcheck
        - revive
        - staticcheck
        - unused
formatters:
  enable:
    - goimports
issues:
  max-issues-per-linter: 0
  max-same-issues: 0